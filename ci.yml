name: Backend CI

on:
  push:
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pip install httpx pytest pytest-asyncio
      - name: Import check
        run: python -c "from main import app, analyze_dataset, semantic_search; print('OK')"
        env:
          GOOGLE_API_KEY: dummy
          LLM_PROVIDER: gemini
